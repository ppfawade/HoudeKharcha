name: EAS Build – Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install EAS CLI globally
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 5. Build APK via EAS (uses EXPO_TOKEN secret for auth)
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6. (Optional) Download & upload the built APK as a GitHub artifact
      - name: Download APK artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | \
            node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
            console.log(JSON.parse(d)[0].artifacts?.buildUrl || '')")
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o HoudeKharcha.apk
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Upload APK to GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HoudeKharcha-APK
          path: HoudeKharcha.apk
          if-no-files-found: warn
          retention-days: 30
